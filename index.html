<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid ul Adha Mubarak | M. Masoom Farazi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0702;
      color: #f5f5f5;
      overflow-x: hidden;
    }

    /* 4K Ultra HD Hero Section utilizing your local image asset */
    header {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      background: url('image_6223da.png') no-repeat center center/cover;
      padding: 60px 20px;
    }

    /* Cinematic Amber Vignette Overlay */
    header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(40, 24, 5, 0.1) 0%, rgba(10, 7, 2, 0.85) 100%);
      z-index: 1;
    }

    .hero {
      position: relative;
      max-width: 1000px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Professional Executive Circular Profile Frame */
    .profile-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 25px;
      border-radius: 50%;
      background: linear-gradient(45deg, #a37014, #ffd700, #b8860b, #fff099);
      padding: 4px; 
      box-shadow: 0 0 35px rgba(255, 215, 0, 0.35), 0 10px 20px rgba(0, 0, 0, 0.6);
      animation: smoothFloat 4s ease-in-out infinite alternate;
    }

    .profile-frame {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: #111;
      position: relative;
    }

    .profile-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%; /* Perfectly aligns to your facial portrait */
      display: block;
    }

    h1 {
      font-size: clamp(2.3rem, 7vw, 5rem);
      color: #ffd700;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 3px;
      text-shadow: 4px 4px 30px rgba(0, 0, 0, 0.95);
      line-height: 1.2;
    }

    .designer-tag {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: #fff;
      letter-spacing: 2px;
      margin-top: 10px;
      font-weight: 400;
      text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.9);
    }

    .designer-tag span {
      color: #ffd700;
      font-weight: 700;
    }

    .typing {
      font-size: clamp(0.95rem, 2.8vw, 1.35rem);
      margin-top: 20px;
      min-height: 60px;
      font-weight: 300;
      color: #eae1cc;
      text-shadow: 2px 2px 20px rgba(0, 0, 0, 0.95);
      max-width: 750px;
      margin-inline: auto;
      line-height: 1.6;
    }

    /* Primary Interactive Audio Button */
    .btn-audio {
      padding: 16px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.4s ease;
      display: inline-block;
      margin-top: 30px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      background: linear-gradient(45deg, #cc9622, #ffd700);
      color: #0c0802;
      box-shadow: 0 10px 35px rgba(204, 150, 34, 0.4);
      font-family: 'Poppins', sans-serif;
    }

    .btn-audio:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 15px 45px rgba(204, 150, 34, 0.6);
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      background: #060401;
      color: #8c8374;
      border-top: 1px solid rgba(255, 215, 0, 0.15);
      font-size: 0.9rem;
    }

    @keyframes smoothFloat {
      0% { transform: translateY(0); }
      100% { transform: translateY(-8px); }
    }

    @media(max-width: 768px) {
      .profile-container {
        width: 150px;
        height: 150px;
      }
    }
  </style>
</head>
<body>

<audio id="eidAudio" src="WhatsApp Audio 2026-05-26 at 12.15.57 PM.mpeg" loop></audio>

<header>
  <div class="hero">
    <div class="profile-container">
      <div class="profile-frame">
        <img src="WhatsApp Image 2026-05-26 at 12.12.51 PM.jpeg" id="userPortrait" alt="M. Masoom Farazi" onerror="imgErrorFallback()">
      </div>
    </div>

    <h1>Eid ul Adha Mubarak</h1>
    <div class="designer-tag">Greetings From <span>M. Masoom Farazi</span></div>
    
    <p class="typing" id="typing"></p>
    
    <div>
      <button id="audioControlBtn" class="btn-audio" onclick="toggleAudio()">🔊 Tap to Play Audio</button>
    </div>
  </div>
</header>

<footer>
  <p>&copy; 2026 M. Masoom Farazi. All Spiritual Blessings Shared.</p>
</footer>

<script>
  // Safe alternate backup runner in case local filename properties change or miss matching case style
  function imgErrorFallback() {
    document.getElementById('userPortrait').src = "image_6223da.png"; 
  }

  // Typing Effect Engine
  const text = "May your sacrifices be accepted and your home be infinitely filled with the divine blessings and peace of Allah.";
  let i = 0;
  function typingEffect() {
    if (i < text.length) {
      document.getElementById('typing').textContent += text.charAt(i);
      i++;
      setTimeout(typingEffect, 45);
    }
  }
  setTimeout(typingEffect, 600);

  // Audio elements and toggle click logic
  const audio = document.getElementById('eidAudio');
  const audioBtn = document.getElementById('audioControlBtn');

  function toggleAudio() {
    if (audio.paused) {
      audio.play();
      audioBtn.innerHTML = "🔇 Pause Audio";
    } else {
      audio.pause();
      audioBtn.innerHTML = "🔊 Tap to Play Audio";
    }
  }
</script>

</body>
</html>
